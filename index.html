<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorraine Long_ | Portfolio</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background-color: #050505;
      background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px);
      background-size: 14px 14px;
      color: white;
    }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    .project-card:hover .img-container { transform: scale(0.98); }
    .img-container { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
  </style>

<body>
  <div id="root"></div>

    const projects = [
      { id: 1, title: '符号回廊', subtitle: 'SIGNLESS', category: 'Game', year: '2023', tags: ['游戏设计', '独立游戏'], image: './images/1.jpg' },

    const resumeData = {
      education: [

        { year: '2023.10 - 2024.10', title: '清华大学艺术博物馆', desc: '志愿者 VOLUNTEER' }

    R R R 4 . . @ .

    # 0          R          4       4

                  key={project.id} 
                  className={`mb-24 md:mb-0 project-card cursor-pointer group ${
                    index % 2 === 1 ? 'md:mt-[30vh]' : 'md:mb-[15vh]'

                      <img

              <div className="space-y-12">
                <div>
                  <h3 className="text-zinc-500 text-[10px] tracking-widest mb-4 border-b border-zinc-800 pb-2">01 // EDUCATION & AFFILIATION</h3>
                  {resumeData.education.map((item, i) => (
                    <div key={i} className="mb-4 flex flex-col md:flex-row md:gap-8 group">
                      <div className="text-zinc-500 text-xs w-32 shrink-0 mb-1 md:mb-0 transition-colors group-hover:text-white">{item.year}</div>
                      <div>
                        <div className="text-sm font-bold text-white mb-1">{item.title}</div>
                        <div className="text-xs text-zinc-400">{item.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>

                <div>
                  <h3 className="text-zinc-500 text-[10px] tracking-widest mb-4 border-b border-zinc-800 pb-2">02 // SOCIAL & CREATIVE EXPERIENCE</h3>

                      <div className="text-zinc-500 text-xs w-32 shrink-0 mb-1 md:mb-0 transition-colors group-hover:text-white">{item.year}</div>
                      <div>
                        <div className="text-sm font-bold text-white mb-1">{item.title}</div>
                        <div className="text-xs text-zinc-400">{item.desc}</div>

                  {resumeData.awards.map((item, i) => (
                    <div key={i} className="mb-4 flex flex-col md:flex-row md:gap-8 group border-b border-zinc-900 pb-4">
                      <div className="text-zinc-500 text-xs w-32 shrink-0 mb-1 md:mb-0 transition-colors group-hover:text-white">{item.year}</div>
                      <div>
                        <div className="text-sm font-bold text-white mb-1">{item.title}</div>
                        <div className="text-xs text-zinc-400">{item.desc}</div>

                    </div>

                        <div className="text-sm font-bold text-white mb-1">{item.title}</div>
                        <div className="text-xs text-zinc-400">{item.desc}</div>
                      </div>
                    </div>
                  ))}

            {isFilterOpen && (
              <div className="bg-[#111] border border-zinc-800 border-b-0 text-zinc-300 text-xs uppercase p-2">
                {['All', 'Game', 'Display', 'Product'].map((cat) => (
                  <div 
                    key={cat}
                    onClick={() => { setFilter(cat); setIsFilterOpen(false); }}
                    className={`py-2 px-2 cursor-pointer hover:bg-white hover:text-black transition-colors ${filter === cat ? 'text-white font-bold' : ''}`}
                  >
                    {cat === 'All' ? 'SHOW ALL WORKS' : `FILTER: ${cat.toUpperCase()}`}
                  </div>
                ))}
              </div>
            )}
            <div>
              <button 
                onClick={() => setIsFilterOpen(!isFilterOpen)}
                className="w-full bg-white text-black p-3 flex justify-between items-center text-xs font-bold uppercase hover:bg-zinc-200 transition-colors"
              >
                <span>{filter === 'All' ? 'ALL WORKS' : filter.toUpperCase()}</span>
                <span className="text-lg leading-none">{isFilterOpen ? '-' : '+'}</span>
              </button>
              <div className="bg-[#888] text-black px-3 py-1 text-[10px] flex justify-between items-center uppercase font-bold tracking-widest">
                <span>:/FILTERS</span>
                <span>{filteredProjects.length} PROJECTS</span>
              </div>
            </div>
          </div>

          <pre className="absolute bottom-12 left-1/4 text-[8px] md:text-[10px] text-zinc-600 opacity-50 pointer-events-none whitespace-pre leading-[1.2]">
            {asciiArt}
          </pre>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
