    // ==========================================
    // 💡 流星拖尾发光星星光标组件
    // ==========================================
    function CustomCursor() {
      const [pos, setPos] = useState({ x: -100, y: -100 });
      const [isPointer, setIsPointer] = useState(false);

      useEffect(() => {
        const handleMouseMove = (e) => {
          setPos({ x: e.clientX, y: e.clientY });
          
          const target = e.target;
          const isClickable = 
            window.getComputedStyle(target).cursor === 'pointer' || 
            target.tagName.toLowerCase() === 'button' || 
            target.tagName.toLowerCase() === 'a' ||
            target.closest('button') || 
            target.closest('a') ||
            target.closest('.cursor-pointer') ||
            target.closest('.gallery-scroll');
            
          setIsPointer(!!isClickable);
        };

        window.addEventListener('mousemove', handleMouseMove);
        return () => window.removeEventListener('mousemove', handleMouseMove);
      }, []);

      if (pos.x === -100) return null;

      return (
        <div className="pointer-events-none fixed inset-0 z-[99999]">
          <div className="absolute w-screen h-[1px] bg-white/5" style={{ top: pos.y, left: 0 }} />
          <div className="absolute h-screen w-[1px] bg-white/5" style={{ left: pos.x, top: 0 }} />
          
          <div 
            className="absolute w-3 h-3 bg-white/60 rounded-full transform -translate-x-1/2 -translate-y-1/2 blur-[2px] transition-all duration-75 ease-out mix-blend-screen"
            style={{ left: pos.x, top: pos.y }}
          />
          <div 
            className="absolute w-2 h-2 bg-white/40 rounded-full transform -translate-x-1/2 -translate-y-1/2 blur-[3px] transition-all duration-150 ease-out mix-blend-screen"
            style={{ left: pos.x, top: pos.y }}
          />
          <div 
            className="absolute w-1.5 h-1.5 bg-white/20 rounded-full transform -translate-x-1/2 -translate-y-1/2 blur-[4px] transition-all duration-300 ease-out mix-blend-screen"
            style={{ left: pos.x, top: pos.y }}
          />

          <div 
            className={`absolute rounded-full transform -translate-x-1/2 -translate-y-1/2 transition-all duration-300 ease-out flex items-center justify-center mix-blend-screen
              ${isPointer ? 'w-16 h-16 bg-white/10 border border-white/30 scale-100 blur-[1px]' : 'w-0 h-0 scale-0 opacity-0'}
            `}
            style={{ left: pos.x, top: pos.y }}
          />
          
          <div 
            className={`absolute transform -translate-x-1/2 -translate-y-1/2 mix-blend-screen transition-transform duration-200 ${isPointer ? 'scale-125' : 'scale-100'}`}
            style={{ left: pos.x, top: pos.y }}
          >
            <svg viewBox="0 0 24 24" fill="white" className="w-5 h-5 drop-shadow-[0_0_10px_rgba(255,255,255,1)] animate-pulse">
              <path d="M12 0L14.5 9.5L24 12L14.5 14.5L12 24L9.5 14.5L0 12L9.5 9.5L12 0Z" />
            </svg>
          </div>
        </div>
      );
    }

    function ProjectCard({ project, index, onClick }) {
      const [isHovered, setIsHovered] = useState(false);
      const [showVideo, setShowVideo] = useState(false);
      const videoRef = useRef(null);

      useEffect(() => {
        let timer;
        if (isHovered && project.video) {
          if (videoRef.current) {
            videoRef.current.play().catch(() => {}); 
          }
          timer = setTimeout(() => {
            setShowVideo(true);
          }, 1200);
        } else {
          setShowVideo(false);
          if (videoRef.current) {
            videoRef.current.pause();
            videoRef.current.currentTime = 0; 
          }
        }
        return () => clearTimeout(timer);
      }, [isHovered, project.video]);

                          setActiveSceneModal({ ...activeSceneModal, index: prevIdx, current: activeSceneModal.list[prevIdx] });
                        }} 
                        className="hover:text-cyan-400 transition-colors cursor-pointer flex items-center gap-2"
                      >
                        &lt; PREV SCENE
                      </button>
                      <span className="text-zinc-600">[ 0{activeSceneModal.index + 1} / 0{activeSceneModal.list.length} ]</span>
                      <button 
                        onClick={() => {
                          const nextIdx = (activeSceneModal.index + 1) % activeSceneModal.list.length;
                          setActiveSceneModal({ ...activeSceneModal, index: nextIdx, current: activeSceneModal.list[nextIdx] });
                        }} 
                        className="hover:text-cyan-400 transition-colors cursor-pointer flex items-center gap-2"
                      >
                        NEXT SCENE &gt;
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            <header className="w-full p-6 md:p-8 flex justify-between items-start z-40">
              <button 
                onClick={() => setSelectedProject(null)}
                className="font-sans font-black text-xl md:text-2xl uppercase tracking-tighter hover:text-zinc-400 transition-colors flex items-center gap-2 cursor-pointer"
              >
                <span className="text-zinc-600">{"<"}</span> BACK
              </button>
              <div className="text-right text-[10px] md:text-xs text-zinc-400 uppercase leading-relaxed">
                <div>PROJECT FILE: {String(selectedProject.id).padStart(2, '0')}</div>
                <div>STATUS: CLASSIFIED</div>
              </div>
            </header>

            <main className="px-4 md:px-12 max-w-[1400px] mx-auto pb-32 pt-12">
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-24">
                <div className="lg:col-span-4 flex flex-col items-start order-2 lg:order-1">
                  
                  {selectedProject.logo && (
                    <img 
                      src={selectedProject.logo} 
                      alt="Project Logo" 
                      className="h-20 md:h-24 w-auto object-contain mb-8 filter drop-shadow-lg"
                      onError={(e) => e.target.style.display='none'} 
                    />
                  )}

                  <h1 className="font-sans font-black text-4xl md:text-6xl uppercase tracking-tighter mb-2 leading-none text-white">
                    {selectedProject.title}
                  </h1>
                  <div className="text-zinc-400 text-xs md:text-sm tracking-widest uppercase mb-12">
                    {selectedProject.subtitle} // {selectedProject.year}
                  </div>

                  <div className="w-full border-t border-zinc-800 pt-4 mb-6">
                    <div className="text-[10px] text-zinc-600 mb-1 tracking-widest">:/ CATEGORY</div>
                    <div className="text-xs uppercase text-zinc-300">{selectedProject.category}</div>
                  </div>
                  <div className="w-full border-t border-zinc-800 pt-4 mb-12">
                    <div className="text-[10px] text-zinc-600 mb-1 tracking-widest">:/ TAGS</div>
                    <div className="text-xs uppercase text-zinc-300">{selectedProject.tags.join(' / ')}</div>
                  </div>

                  <div className="text-zinc-400 text-sm leading-relaxed font-sans text-justify whitespace-pre-wrap">
                    {selectedProject.detailText || "System Note: No detailed description provided for this project yet."}
                  </div>
                  
                  {selectedProject.detailTextEn && (
                    <div className="text-zinc-500 text-[11px] leading-relaxed font-sans text-justify mt-6 whitespace-pre-wrap">
                      {selectedProject.detailTextEn}
                    </div>
                  )}
                </div>

                <div className="lg:col-span-8 order-1 lg:order-2">
                  <div className="w-full bg-[#111] border border-zinc-800 relative p-2">
                    <div className="absolute top-0 left-0 w-2 h-2 border-t border-l border-zinc-500"></div>
                    <div className="absolute top-0 right-0 w-2 h-2 border-t border-r border-zinc-500"></div>
                    <div className="absolute bottom-0 left-0 w-2 h-2 border-b border-l border-zinc-500"></div>
                    <div className="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-zinc-500"></div>
                    
                    {selectedProject.video ? (
                      <div className="flex flex-col">
                        <video 
                          ref={detailVideoRef}
                          src={selectedProject.video} 
                          autoPlay 
                          loop 
                          muted 
                          playsInline 
                          className="w-full h-auto object-cover opacity-90" 
                        />
                        <div className="flex justify-between items-center mt-3 pt-3 border-t border-zinc-800">
                          <div className="text-[10px] text-zinc-600 tracking-widest">:/ MEDIA_PLAYER</div>
                          <button 
                            onClick={() => setIsDetailMuted(!isDetailMuted)}
                            className={`cursor-pointer text-[10px] font-bold tracking-widest border px-3 py-1 transition-all ${
                              isDetailMuted 
                                ? 'border-zinc-700 text-zinc-400 hover:text-white hover:border-white' 
                                : 'bg-white text-black border-white'
                            }`}
                          >
                            {isDetailMuted ? 'SOUND: OFF [UNMUTE]' : 'SOUND: ON [MUTE]'}
                          </button>
                        </div>
                      </div>
                    ) : (
                      <img src={selectedProject.image} alt={selectedProject.title} className="w-full h-auto object-cover opacity-90" />
                    )}
                  </div>

                  {/* --- 动态渲染额外的内容板块 --- */}
                  {selectedProject.extraSections && selectedProject.extraSections.map((section, idx) => {
                    
                    // 💡 新增逻辑 1：带有设计感的概念引言排版
                    if (section.type === 'concept-text') {
                      return (
                        <div key={section.id || idx} className="mt-12 md:mt-24 w-full relative z-10">
                          <div className="flex justify-between items-end border-b border-zinc-800 pb-2 mb-8">
                            <div className="text-[10px] text-zinc-600 tracking-widest uppercase">:/ {section.title}</div>
                          </div>
                          
                          <div className="pl-6 md:pl-10 border-l-2 border-cyan-800 relative bg-gradient-to-r from-cyan-900/10 to-transparent py-4">
                            <div className="absolute top-0 left-[-5px] w-2 h-2 rounded-full bg-cyan-500 shadow-[0_0_10px_rgba(6,182,212,0.8)]"></div>
                            <h3 className="text-xl md:text-3xl font-sans font-black text-white mb-6 tracking-tight">
                              {section.headline}
                            </h3>
                            <div className="text-zinc-400 text-sm md:text-base leading-loose font-sans text-justify whitespace-pre-wrap">
                              {section.content}
                            </div>
                          </div>
                        </div>
                      );
                    }

                    // 💡 新增逻辑 2：横向滑动的区位分析图集
                    if (section.type === 'horizontal-gallery') {
                      return (
                        <div key={section.id || idx} className="mt-12 md:mt-24 w-full relative z-10 group">
                          <div className="flex justify-between items-end border-b border-zinc-800 pb-2 mb-4">
                            <div className="text-[10px] text-zinc-600 tracking-widest uppercase">:/ {section.title}</div>
                            <div className="text-[10px] text-cyan-500 tracking-widest uppercase animate-pulse flex items-center gap-2">
                               <span>&lt; SWIPE TO EXPLORE &gt;</span>
                            </div>
                          </div>
                          
                          <div className="w-full bg-[#111] border border-zinc-800 p-2 relative shadow-2xl">
                            {/* 画廊滚动容器 */}
                            <div className="flex overflow-x-auto gallery-scroll snap-x snap-mandatory gap-4 pb-4 items-center h-[50vh] md:h-[65vh]">
                              {section.images.map((img, i) => (
                                <div key={i} className="min-w-[85%] md:min-w-[60%] h-full flex-shrink-0 snap-center relative border border-zinc-800 bg-black group/img cursor-ew-resize overflow-hidden">
                                   <img 
                                      src={img.src} 
                                      alt={img.alt} 
                                      className="w-full h-full object-contain opacity-80 group-hover/img:opacity-100 group-hover/img:scale-[1.02] transition-all duration-700" 
                                      onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }}
                                   />
                                   <div className="absolute inset-0 hidden items-center justify-center text-[10px] font-mono text-zinc-600">
                                      <span>[IMG_MISSING: {img.src}]</span>
                                   </div>
                                   <div className="absolute bottom-4 left-4 bg-black/80 px-3 py-1.5 border border-zinc-700 text-[10px] font-mono text-zinc-400 backdrop-blur-sm z-10">
                                      {String(i + 1).padStart(2, '0')} / {String(section.images.length).padStart(2, '0')}
                                   </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      );
                    }

                    if (section.type === 'interactive-flow') {
                      return <InteractiveFlow key={section.id || idx} section={section} />;
                    }

                    if (section.type === 'terrain-puzzle-flow') {
                      return <TerrainPuzzleFlow key={section.id || idx} section={section} />;
                    }

                    if (section.type === 'scene-map') {
                      return (
                        <div key={section.id || idx} className="mt-12 md:mt-20 w-full">
                          <div className="flex justify-between items-end border-b border-zinc-800 pb-2 mb-4">
                            <div className="text-[10px] text-zinc-600 tracking-widest uppercase">:/ {section.title}</div>
                            <div className="text-[10px] text-cyan-500 tracking-widest uppercase animate-pulse">
                              [ HOVER & CLICK ]
                            </div>
                          </div>
                          
                          <div className="w-full relative aspect-square md:aspect-[21/9] bg-[#050505] border border-zinc-800 p-1 overflow-hidden group">
                            
                            <div className="absolute inset-1 grid grid-cols-2 grid-rows-2 gap-1 z-0 opacity-60 group-hover:opacity-100 transition-opacity duration-700">
                              {section.scenes.map((scene, i) => (
                                <div 
                                  key={i} 
                                  onClick={() => setActiveSceneModal({ current: scene, list: section.scenes, index: i })}
                                  onMouseEnter={() => setHoveredSceneBg(scene.image)}
                                  onMouseLeave={() => setHoveredSceneBg(null)}
                                  className="relative w-full h-full overflow-hidden bg-black group/scene cursor-pointer"
                                >
                                  <img 
                                    src={scene.image} 
                                    alt={scene.name} 
                                    className="w-full h-full object-cover grayscale opacity-70 group-hover/scene:grayscale-0 group-hover/scene:opacity-100 group-hover/scene:scale-110 transition-all duration-700" 
                                    onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }}
                                  />
                                  <div className="absolute inset-0 hidden items-center justify-center bg-[#111]">
                                    <span className="text-zinc-600 text-[10px] font-mono opacity-50">[SCENE_{i+1}]</span>
                                  </div>
                                  <div className="absolute bottom-2 left-2 md:bottom-4 md:left-4 text-[8px] md:text-[10px] font-bold tracking-widest text-white/50 group-hover/scene:text-white uppercase drop-shadow-md z-10 transition-colors bg-black/60 px-2 py-1 backdrop-blur-sm border border-zinc-700 group-hover/scene:border-white">
                                    {scene.name} &gt;
                                  </div>
                                </div>
                              ))}
                            </div>
                            
                            <div className="absolute inset-0 z-20 flex items-center justify-center pointer-events-none">
                              <div className="relative w-1/2 md:w-1/3 max-w-[400px] hover:scale-110 transition-transform duration-700 filter drop-shadow-[0_0_40px_rgba(0,0,0,0.9)]">
                                 <img 
                                   src={section.centerMap} 
                                   alt="Central Floor Plan" 
                                   className="w-full h-auto object-contain" 
                                   onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }}
                                 />
                                 <div className="absolute inset-0 hidden flex-col items-center justify-center border border-dashed border-zinc-500 rounded-full bg-black/50 backdrop-blur-md">
                                   <span className="text-zinc-400 text-xs font-mono mb-1">Upload Map PNG</span>
                                   <span className="text-zinc-600 text-[8px] font-mono">./images/signless-map.png</span>
                                 </div>
                              </div>
                            </div>
                            
                          </div>
                        </div>
                      );
                    }

                    return (
                      <div key={section.id || idx} className="mt-12 md:mt-20 w-full relative z-10">
                        <div className="flex justify-between items-end border-b border-zinc-800 pb-2 mb-4">
                          <div className="text-[10px] text-zinc-600 tracking-widest uppercase">:/ {section.title}</div>
                        </div>
                        
                        <div className="w-full bg-[#111] border border-zinc-800 relative p-1 overflow-hidden group">
                          <div className="relative z-10 flex justify-center">
                            <img 
                              src={section.image} 
                              alt={section.title} 
                              className="opacity-90 grayscale hover:grayscale-0 transition-all duration-700 block w-full h-auto object-contain"
                              onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }}
                            />
                            <div className="absolute inset-0 hidden items-center justify-center bg-[#111] z-0 min-w-full">
                              <span className="text-zinc-600 text-sm tracking-widest opacity-50 font-mono">
                                [IMG_REQ: {section.title}]
                              </span>
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })}

                </div>
              </div>
            </main>
          </div>
        );
      }

      // ========== 视图 A：主页列表 ==========
      return (
        <div className="min-h-screen font-mono selection:bg-white selection:text-black relative overflow-x-hidden bg-[#050505]">
          <CustomCursor />
          
          <header className="fixed top-0 w-full p-6 md:p-8 flex justify-between items-start z-40 pointer-events-none">
            <div className="font-sans font-black text-3xl md:text-5xl tracking-tighter uppercase pointer-events-auto mix-blend-difference">
              Lorraine<span className="text-zinc-500">_</span>
            </div>
            <div className="text-right text-[10px] md:text-xs text-zinc-400 uppercase leading-relaxed hidden sm:flex flex-col items-end pointer-events-auto mix-blend-difference">
              <div>DISPLAY & GAME DESIGN</div>
              <div>INFO@LORRAINE.DESIGN</div>
              <a href="#about" className="mt-2 border-b border-zinc-600 hover:text-white hover:border-white transition-colors cursor-pointer">
                [ VIEW PROFILE ]
              </a>
            </div>
          </header>

          <div className="fixed top-1/4 right-[10%] text-xs text-zinc-600 pointer-events-none mix-blend-difference">03</div>
          <div className="fixed top-2/3 left-[5%] text-xs text-zinc-600 pointer-events-none mix-blend-difference">02</div>

          <main className="pt-32 pb-32 px-4 md:px-12 max-w-[1800px] mx-auto z-10 relative min-h-screen">
            
            <div className="mb-16 md:mb-24 flex flex-col md:flex-row items-start md:items-end gap-4 md:gap-12 border-b border-zinc-800 pb-8">
              <div className="text-zinc-600 text-[10px] md:text-xs font-mono tracking-widest uppercase mb-2 md:mb-0 w-24 shrink-0">
                :/ DIRECTORY
              </div>
              <div className="flex flex-wrap gap-x-6 gap-y-2 md:gap-x-12">
                {['All', '展示设计', '交互游戏', 'Other Works'].map((cat) => (
                  <button
                    key={cat}
                    onClick={() => setFilter(cat)}
                    className={`cursor-pointer font-sans font-black text-2xl md:text-5xl uppercase tracking-tighter transition-all duration-300 ${
                      filter === cat 
                        ? 'text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]' 
                        : 'text-zinc-800 hover:text-zinc-400'
                    }`}
                  >
                    {cat === 'All' ? 'ALL WORKS' : cat}
                  </button>
                ))}
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 lg:gap-x-16">
              {filteredProjects.map((project, index) => (
                <ProjectCard 
                  key={project.id} 
                  project={project} 
                  index={index} 
                  onClick={setSelectedProject} 
                />
              ))}
            </div>
          </main>

          <div className="fixed bottom-0 left-0 w-full md:bottom-6 md:left-6 z-50 md:w-[240px] shadow-2xl bg-[#050505]/95 backdrop-blur border-t md:border border-zinc-800">
            <div className="hidden md:flex bg-zinc-200 text-black px-3 py-2 text-[10px] justify-between items-center uppercase font-bold tracking-widest">
              <span>:/ FILTERS</span>
              <span>{filteredProjects.length} PROJECTS</span>
            </div>
            <div className="flex flex-row md:flex-col font-mono text-[10px] md:text-xs uppercase overflow-x-auto w-full hide-scrollbar">
              {['All', '展示设计', '交互游戏', 'Other Works'].map((cat) => (
                <button 
                  key={cat}
                  onClick={() => { setFilter(cat); window.scrollTo(0,0); }}
                  className={`cursor-pointer flex-shrink-0 py-4 md:py-3 px-6 md:px-4 text-center md:text-left border-r md:border-r-0 md:border-t border-zinc-800 transition-colors whitespace-nowrap ${
                    filter === cat ? 'bg-white text-black font-bold' : 'text-zinc-400 hover:text-white hover:bg-zinc-900'
                  }`}
                >
                  {cat === 'All' ? 'SHOW ALL WORKS' : cat}
                </button>
              ))}
            </div>
          </div>

          <section id="about" className="px-4 md:px-12 max-w-[1800px] mx-auto pb-48 pt-24 z-10 relative bg-[#050505]">
            <div className="mb-16 border-t border-white pt-4">
              <div className="flex justify-between items-end">
                <h2 className="font-sans font-black text-4xl md:text-6xl tracking-tighter uppercase">
                  Profile<span className="text-zinc-600">_Data</span>
                </h2>
                <div className="text-xs text-zinc-500 hidden md:block">:/ ID: 2022011870</div>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-x-24 gap-y-16">
              <div className="space-y-12">
                <div>
                  <h3 className="text-zinc-500 text-[10px] tracking-widest mb-4 border-b border-zinc-800 pb-2">01 // EDUCATION & AFFILIATION</h3>
                  {resumeData.education.map((item, i) => (
                    <div key={i} className="mb-4 flex flex-col md:flex-row md:gap-8 group">
                      <div className="text-zinc-500 text-xs w-32 shrink-0 mb-1 md:mb-0 transition-colors group-hover:text-white">{item.year}</div>
                      <div>
                        <div className="text-sm font-bold text-white mb-1">{item.title}</div>
                        <div className="text-xs text-zinc-400">{item.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>

                <div>
                  <h3 className="text-zinc-500 text-[10px] tracking-widest mb-4 border-b border-zinc-800 pb-2">02 // SOCIAL & CREATIVE EXPERIENCE</h3>
                  {resumeData.experience.map((item, i) => (
                    <div key={i} className="mb-4 flex flex-col md:flex-row md:gap-8 group border-b border-zinc-900 pb-4">
                      <div className="text-zinc-500 text-xs w-32 shrink-0 mb-1 md:mb-0 transition-colors group-hover:text-white">{item.year}</div>
                      <div>
                        <div className="text-sm font-bold text-white mb-1">{item.title}</div>
                        <div className="text-xs text-zinc-400">{item.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="space-y-12">
                <div>
                  <h3 className="text-zinc-500 text-[10px] tracking-widest mb-4 border-b border-zinc-800 pb-2">03 // AWARDS & HONORS</h3>
                  {resumeData.awards.map((item, i) => (
                    <div key={i} className="mb-4 flex flex-col md:flex-row md:gap-8 group border-b border-zinc-900 pb-4">
                      <div className="text-zinc-500 text-xs w-32 shrink-0 mb-1 md:mb-0 transition-colors group-hover:text-white">{item.year}</div>
                      <div>
                        <div className="text-sm font-bold text-white mb-1">{item.title}</div>
                        <div className="text-xs text-zinc-400">{item.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>

                <div>
                  <h3 className="text-zinc-500 text-[10px] tracking-widest mb-4 border-b border-zinc-800 pb-2">04 // ACADEMIC RESEARCH</h3>
                  {resumeData.research.map((item, i) => (
                    <div key={i} className="mb-4 flex flex-col md:flex-row md:gap-8 group border-b border-zinc-900 pb-4">
                      <div className="text-zinc-500 text-xs w-32 shrink-0 mb-1 md:mb-0 transition-colors group-hover:text-white">{item.year}</div>
                      <div>
                        <div className="text-sm font-bold text-white mb-1">{item.title}</div>
                        <div className="text-xs text-zinc-400">{item.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </section>

          <pre className="absolute bottom-12 left-1/4 text-[8px] md:text-[10px] text-zinc-600 opacity-50 pointer-events-none whitespace-pre leading-[1.2]">
            {asciiArt}
          </pre>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
